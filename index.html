<!DOCTYPE html>
<html lang="ru" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidNote — AI-конспекты из видео и аудио</title>
    <meta name="description" content="Вставь YouTube-ссылку или загрузи файл — получи конспект с AI">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #6366f1;
            --brand-dark: #4f46e5;
            --ring-color: rgba(99, 102, 241, 0.2);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #030712;
            color: #f1f5f9;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
        }

        .premium-glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand), #8b5cf6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(31, 41, 55, 0.5);
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-secondary:hover {
            background: rgba(55, 65, 81, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
            color: #fff;
        }

        .mode-chip {
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(17, 24, 39, 0.4);
        }

        .mode-chip:hover {
            border-color: rgba(99, 102, 241, 0.3);
        }

        .mode-chip.active {
            background: var(--brand);
            border-color: var(--brand);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .input-glow:focus-within {
            box-shadow: 0 0 0 2px var(--ring-color);
            border-color: var(--brand);
        }

        @keyframes pulse-slow {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .animate-pulse-slow {
            animation: pulse-slow 3s infinite;
        }

        /* Prevent SVG from exploding in size */
        svg {
            display: inline-block;
            vertical-align: middle;
            flex-shrink: 0;
        }

        #progressBar {
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 10px;
        }

        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

<body class="antialiased selection:bg-indigo-500/30">

    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/10 blur-[120px] rounded-full">
        </div>
    </div>

    <div class="relative z-10 max-w-2xl mx-auto px-6 py-12 flex flex-col min-h-screen">

        <!-- Header -->
        <header class="text-center mb-10 fade-in">
            <div
                class="inline-flex items-center justify-center p-3 sm:p-4 rounded-3xl bg-gradient-to-br from-indigo-500/20 to-purple-500/20 border border-white/5 shadow-inner mb-6">
                <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    style="width: 40px; height: 40px;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </div>
            <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-white mb-3">
                Vid<span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Note</span>
            </h1>
            <p class="text-slate-400 text-base sm:text-lg font-light tracking-wide">Превращай видео в краткие заметки с
                AI</p>
        </header>

        <!-- Main Workspace -->
        <main class="premium-glass rounded-[2rem] p-6 sm:p-10 shadow-3xl fade-in overflow-hidden relative">

            <div class="flex flex-col space-y-8">

                <!-- Error Banner -->
                <div id="errorBanner"
                    class="hidden bg-red-500/10 border border-red-500/20 text-red-300 text-sm rounded-2xl px-5 py-4 flex items-center gap-3 animate-pulse-slow">
                    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <span id="errorText" class="font-medium"></span>
                </div>

                <!-- Tabs -->
                <div class="space-y-4">
                    <div class="flex p-1 bg-gray-900/50 rounded-2xl border border-white/5">
                        <button id="tabUrl" onclick="switchTab('url')"
                            class="tab active flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-semibold transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            YouTube
                        </button>
                        <button id="tabFile" onclick="switchTab('file')"
                            class="tab flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-semibold transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                            </svg>
                            Файл
                        </button>
                    </div>

                    <!-- URL Input Panel -->
                    <div id="urlPanel" class="space-y-2">
                        <div
                            class="relative group input-glow bg-black/20 border border-white/10 rounded-2xl transition-all">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="w-5 h-5 text-gray-500 group-focus-within:text-indigo-500 transition-colors"
                                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path
                                        d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                                </svg>
                            </div>
                            <input id="linkInput" type="text" placeholder="Вставь ссылку на видео..."
                                class="block w-full pl-12 pr-4 py-5 bg-transparent border-none focus:ring-0 text-white placeholder-gray-600 sm:text-sm">
                        </div>
                    </div>

                    <!-- File Picker Panel -->
                    <div id="filePanel" class="hidden">
                        <div id="dropZone"
                            class="group border-2 border-dashed border-gray-800 hover:border-indigo-500/50 hover:bg-indigo-500/5 rounded-3xl p-10 text-center transition-all cursor-pointer">
                            <input id="fileInput" type="file" class="hidden"
                                accept=".mp3,.wav,.m4a,.ogg,.flac,.webm,.mp4,.mkv,.mov">
                            <div
                                class="mb-4 inline-flex items-center justify-center p-4 bg-gray-900 rounded-2xl border border-white/5 group-hover:scale-110 transition-transform">
                                <svg class="w-8 h-8 text-gray-400 group-hover:text-indigo-400 transition-colors"
                                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path
                                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                </svg>
                            </div>
                            <p class="text-white font-semibold">Нажми или перетащи файл</p>
                            <p class="text-gray-500 text-xs mt-2 uppercase tracking-widest font-bold">MP3 · MP4 · до
                                500MB</p>
                        </div>
                        <div id="fileChip"
                            class="hidden mt-4 flex items-center justify-between bg-indigo-500/10 border border-indigo-500/20 px-4 py-3 rounded-2xl">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <svg class="w-4 h-4 text-indigo-400 shrink-0" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path
                                        d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                                </svg>
                                <span id="fileChipName" class="text-sm font-medium text-indigo-200 truncate"></span>
                            </div>
                            <button onclick="clearFile()"
                                class="p-1 hover:bg-white/10 rounded-lg text-indigo-400 hover:text-white transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Mode Selection -->
                <div class="space-y-4">
                    <label class="text-xs font-bold uppercase tracking-widest text-gray-500 pl-1">Тип конспекта</label>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                        <button class="mode-btn mode-chip rounded-xl py-3 text-sm font-semibold active"
                            data-mode="brief">Кратко</button>
                        <button class="mode-btn mode-chip rounded-xl py-3 text-sm font-semibold"
                            data-mode="notes">Заметки</button>
                        <button class="mode-btn mode-chip rounded-xl py-3 text-sm font-semibold"
                            data-mode="theses">Тезисы</button>
                        <button class="mode-btn mode-chip rounded-xl py-3 text-sm font-semibold"
                            data-mode="timecodes">Таймкоды</button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button id="submitBtn"
                    class="btn-primary w-full py-5 rounded-[1.25rem] text-white font-bold text-lg flex items-center justify-center gap-3 active:scale-[0.98]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    <span>Создать конспект</span>
                </button>

                <!-- Processing State -->
                <div id="loadingState" class="hidden py-4 space-y-6">
                    <div class="flex flex-col items-center gap-4">
                        <div class="w-16 h-1 bg-gray-800 rounded-full overflow-hidden">
                            <div id="progressBar"
                                class="h-full bg-indigo-500 rounded-full shadow-[0_0_15px_rgba(99,102,241,0.5)]"></div>
                        </div>
                        <p id="loadingText" class="text-indigo-200 text-sm font-semibold animate-pulse">Инициализация...
                        </p>
                    </div>
                </div>

                <!-- Result Layout -->
                <div id="resultState" class="hidden border-t border-white/5 pt-8 mt-4 space-y-6">
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <h3 class="flex items-center gap-2 text-indigo-400 font-bold text-sm tracking-widest uppercase">
                            <span id="resultLabel">Кратко</span>
                        </h3>
                        <div class="flex items-center gap-2">
                            <button id="exportPdf"
                                class="flex items-center gap-2 px-3 py-1.5 bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 rounded-lg transition-all text-[10px] font-bold text-red-400">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path
                                        d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                                </svg>
                                PDF
                            </button>
                            <button id="exportWord"
                                class="flex items-center gap-2 px-3 py-1.5 bg-blue-500/10 hover:bg-blue-500/20 border border-blue-500/20 rounded-lg transition-all text-[10px] font-bold text-blue-400">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path
                                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                WORD
                            </button>
                            <button id="copyBtn"
                                class="group flex items-center gap-2 px-4 py-2 bg-indigo-500/5 hover:bg-indigo-500/10 border border-indigo-500/20 rounded-xl transition-all">
                                <span class="text-xs font-bold text-indigo-300 group-hover:text-white">КОПИРОВАТЬ</span>
                            </button>
                        </div>
                    </div>
                    <div id="resultContent"
                        class="custom-scroll text-slate-300 text-sm sm:text-base leading-relaxed p-6 bg-black/30 rounded-3xl border border-white/5 max-h-[500px] overflow-y-auto whitespace-pre-wrap">
                        <!-- Content injected via JS -->
                    </div>
                </div>

            </div>
        </main>

        <!-- Footer -->
        <footer class="text-center mt-auto pt-10 pb-6 fade-in">
            <div
                class="flex items-center justify-center gap-2 mb-2 text-[10px] sm:text-xs font-bold tracking-widest uppercase text-gray-600">
                <span id="backendStatusDot" class="w-1.5 h-1.5 rounded-full bg-gray-800"></span>
                <span id="backendStatusText">Проверка сервера</span>
            </div>
            <p class="text-gray-700 text-[10px] font-medium tracking-tight">POWERED BY GROQ & FASTAPI · VIDNOTE 2.1</p>
        </footer>

    </div>

    <script src="app.js"></script>
</body>

</html>
